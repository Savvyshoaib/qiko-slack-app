_metadata:
  major_version: 1
  minor_version: 1
display_information:
  name: Qiko
  description: Connect your Slack workspace to Qiko — login, list workers, and chat.
  background_color: "#050810"
features:
  bot_user:
    display_name: Qiko
    always_online: true
  slash_commands:
    - command: /qiko-login
      url: https://YOUR_RAILWAY_DOMAIN/slack/events
      description: Sign in to Qiko with your email and password
      usage_hint: "[opens login form]"
      should_escape: false
    - command: /qiko-status
      url: https://YOUR_RAILWAY_DOMAIN/slack/events
      description: Check if your Qiko account is linked
      should_escape: false
    - command: /qiko-logout
      url: https://YOUR_RAILWAY_DOMAIN/slack/events
      description: Disconnect your Qiko account from Slack
      should_escape: false
    - command: /qiko-workers
      url: https://YOUR_RAILWAY_DOMAIN/slack/events
      description: List your Qiko workers
      should_escape: false
    - command: /qiko-worker
      url: https://YOUR_RAILWAY_DOMAIN/slack/events
      description: Select a worker to chat with
      usage_hint: "[worker name or id]"
      should_escape: false
    - command: /qiko-chat
      url: https://YOUR_RAILWAY_DOMAIN/slack/events
      description: Send a message to your active worker
      usage_hint: "[your message]"
      should_escape: false
oauth_config:
  redirect_urls:
    - https://YOUR_RAILWAY_DOMAIN/slack/oauth_redirect
  scopes:
    bot:
      - chat:write
      - commands
      - users:read
      - im:write
settings:
  interactivity:
    is_enabled: true
    request_url: https://YOUR_RAILWAY_DOMAIN/slack/events
  org_deploy_enabled: false
  socket_mode_enabled: false
  token_rotation_enabled: false
