_metadata:
  major_version: 1
  minor_version: 1
display_information:
  name: Qikobot
  description: Connect your Slack workspace to Qiko — login, list workers, and chat with AI workers in channels and DMs.
  background_color: "#546599"
features:
  app_home:
    home_tab_enabled: false
    messages_tab_enabled: true
    messages_tab_read_only_enabled: false
  bot_user:
    display_name: Qikobot
    always_online: true
  slash_commands:
    - command: /qiko-login
      url: https://qiko-slack-app.onrender.com/slack/events
      description: Sign in to Qiko
      usage_hint: "[opens login form]"
      should_escape: false
    - command: /qiko-status
      url: https://qiko-slack-app.onrender.com/slack/events
      description: Check Qiko connection
      should_escape: false
    - command: /qiko-logout
      url: https://qiko-slack-app.onrender.com/slack/events
      description: Disconnect Qiko
      should_escape: false
    - command: /qiko-workers
      url: https://qiko-slack-app.onrender.com/slack/events
      description: List your Qiko workers
      should_escape: false
    - command: /qiko-worker
      url: https://qiko-slack-app.onrender.com/slack/events
      description: Select a worker to chat with
      usage_hint: "[worker name]"
      should_escape: false
    - command: /qiko-chat
      url: https://qiko-slack-app.onrender.com/slack/events
      description: Send a message to your active worker
      usage_hint: "[your message]"
      should_escape: false
oauth_config:
  redirect_urls:
    - https://qiko-slack-app.onrender.com/slack/oauth_redirect
  scopes:
    bot:
      - chat:write
      - commands
      - users:read
      - im:write
      - im:history
  pkce_enabled: true
settings:
  event_subscriptions:
    request_url: https://qiko-slack-app.onrender.com/slack/events
    bot_events:
      - message.im
  interactivity:
    is_enabled: true
    request_url: https://qiko-slack-app.onrender.com/slack/events
  org_deploy_enabled: false
  socket_mode_enabled: false
  token_rotation_enabled: false
  is_mcp_enabled: false
